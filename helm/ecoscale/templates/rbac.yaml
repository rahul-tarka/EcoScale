{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ecoscale.fullname" . }}
  labels:
    {{- include "ecoscale.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Required for pod eviction when ECOSCALE_ENABLE_EXECUTION=true
  - apiGroups: ["policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ecoscale.fullname" . }}
  labels:
    {{- include "ecoscale.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ecoscale.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ecoscale.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
