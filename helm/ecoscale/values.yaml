# EcoScale Helm Values
# Deploy to kube-system for cluster-wide carbon-aware optimization

replicaCount: 1

image:
  repository: ecoscale/ecoscale
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Carbon threshold (gCO2/kWh) - above this, suggest scale-down
carbonThreshold: 350

# Carbon data: mock | carbonintensity | electricitymaps (set ECOSCALE_CARBON_API_KEY via extraEnv if needed)
carbonAPI: mock

# Regions to compare for Sun-Chaser (greener region shift)
compareRegions:
  - us-east-1
  - us-west-2

# Reconciliation interval
interval: 5m

# Service
service:
  type: ClusterIP
  port: 8080

# Prometheus ServiceMonitor (if using Prometheus Operator)
serviceMonitor:
  enabled: false

# Node selector for deployment
nodeSelector: {}

tolerations: []

affinity: {}
