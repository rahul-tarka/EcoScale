# Put overrides in `.env` next to this file (see `.env.example`). Compose loads it automatically.
# Default = demo/mock carbon. Live data: README → "Live carbon in 4 steps or less".
services:
  ecoscale:
    build: .
    ports:
      - "8080:8080"
    environment:
      ECOSCALE_IN_CLUSTER: "false"
      ECOSCALE_CARBON_THRESHOLD: "350"
      ECOSCALE_INTERVAL: "1m"
      ECOSCALE_CARBON_API: ${ECOSCALE_CARBON_API:-mock}
      ECOSCALE_CARBON_API_KEY: ${ECOSCALE_CARBON_API_KEY:-}
      ECOSCALE_COMPARE_REGIONS: ${ECOSCALE_COMPARE_REGIONS:-us-east-1,us-west-2}
