services:
  ecoscale:
    build: .
    ports:
      - "8080:8080"
    environment:
      ECOSCALE_IN_CLUSTER: "false"
      ECOSCALE_CARBON_THRESHOLD: "350"
      ECOSCALE_INTERVAL: "1m"
      ECOSCALE_CARBON_API: "mock"
    # Optional: live carbon — carbonintensity | electricitymaps
    # ECOSCALE_CARBON_API: "electricitymaps"
    # ECOSCALE_CARBON_API_KEY: "your-key"
